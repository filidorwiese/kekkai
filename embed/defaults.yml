image:
  base: node:22
  apt_packages:
    - less
    - git
    - procps
    - sudo
    - zsh
    - gh
    - iptables
    - ipset
    - iproute2
    - dnsutils
    - aggregate
    - jq
    - nano
    - curl
    - ca-certificates
  claude_code_version: "latest"
  docker_cli_version: "27.5.1"

mounts:
  - { source: "~/.claude", target: "/home/kekkai/.claude" }
  - { source: "~/.gitconfig", target: "/home/kekkai/.gitconfig", readonly: true, optional: true }
  - { source: "~/.config/git/allowed_signers", target: "/home/kekkai/.config/git/allowed_signers", readonly: true, optional: true }
  - { source: "${SSH_AUTH_SOCK}", target: "/ssh-agent", optional: true }

env:
  CLAUDE_CONFIG_DIR: /home/kekkai/.claude
  NODE_OPTIONS: "--max-old-space-size=4096"
  POWERLEVEL9K_DISABLE_GITSTATUS: "true"
  SSH_AUTH_SOCK: /ssh-agent
  DEVCONTAINER: "true"
  EDITOR: nano
  VISUAL: nano

firewall:
  allow_host_lan: true
  allowed_domains:
    - registry.npmjs.org
    - api.anthropic.com

claude:
  args: "--dangerously-skip-permissions"

# When true, mount the host /var/run/docker.sock into the sandbox and add
# the kekkai user to the host's docker GID. NB: this effectively grants
# host-root via the docker daemon — enable only for projects that need it.
docker_access: false
