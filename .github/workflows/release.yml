name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist/work
          VERSION="${GITHUB_REF_NAME}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o dist/work/kekkai ./cmd/kekkai

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCH="${{ matrix.goarch }}"
          NAME="kekkai-${VERSION}-linux-${ARCH}.tar.gz"
          tar -C dist/work -czf "dist/${NAME}" kekkai
          (cd dist && sha256sum "${NAME}" > "${NAME}.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: kekkai-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble SHA256SUMS
        run: |
          mkdir -p dist
          find artifacts -type f -name 'kekkai-*-linux-*.tar.gz' -exec cp {} dist/ \;
          find artifacts -type f -name 'kekkai-*-linux-*.tar.gz.sha256' -exec cat {} \; > dist/SHA256SUMS
          cat dist/SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          cd dist
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes \
            kekkai-*-linux-*.tar.gz SHA256SUMS
